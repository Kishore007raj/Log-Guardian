version: '3.8'

services:
  backend:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - SQLITE_DB_PATH=soc.db
      - JSON_EVENTS_PATH=events.json
    volumes:
      - backend_data:/app_data

  frontend:
    build: 
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:

